---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: kinoite
description: This is my personal OS image.
base-image: ghcr.io/ublue-os/kinoite-main
image-version: 43

modules:
  # ── Custom Files ──────────────────────────────────────────────
  # Overlay files from system/ onto the root filesystem.
  # Used for: flatpak overrides, profile.d scripts, etc.
  - type: files
    files:
      - source: system
        destination: /

  # ── System Packages ───────────────────────────────────────────
  - type: dnf
    repos:
      copr:
        - toroidalfox/kime
    install:
      packages:
        # Input method
        - kime-git

        # Editors
        - emacs                # runs as user daemon (see systemd below)
        - neovim

        # LaTeX dependencies
        - perl-core

        # Document viewer
        - zathura
        - zathura-pdf-mupdf

        # Terminal
        - alacritty

        # Modern CLI replacements
        - eza                  # ls
        - zoxide               # cd
        - btop                 # top/htop
        - bat                  # cat
        - ripgrep              # grep
        - fd-find              # find
        - git-delta            # git diff
        - trash-cli            # rm → trash
        - fastfetch            # system info

        # Theming
        - papirus-icon-theme

        # Utilities
        - stow                 # dotfile management
        - p7zip                # archive extraction
        - powertop
        - mu
        - isync

        # Services & tools
        - tailscale            # mesh VPN (daemon enabled below)
        - gh                   # GitHub CLI

    remove:
      packages:
        - firefox              # replaced by Zen Browser (flatpak)
        - firefox-langpacks

  # ── Brew ──────────────────────────────────────────────────────
  - type: brew
    nofile-limits: true # increase nofile limits
    brew-analytics: false # disable telemetry
    
  # ── Flatpaks ──────────────────────────────────────────────────
  - type: default-flatpaks
    configurations:
      - notify: false 
        scope: system
        install:
          # Browser
          - app.zen_browser.zen

          # Communication
          - eu.betterbird.Betterbird
          - me.proton.Mail

          # Media & productivity
          - com.spotify.Client
          - org.libreoffice.LibreOffice

          # Security & networking
          - com.bitwarden.desktop
          - com.protonvpn.www
          - org.fkoehler.KTailctl       # Tailscale GUI

          # Sync & system tools
          - com.github.zocker_160.SyncThingy
          - org.fedoraproject.MediaWriter
          - com.github.tchx84.Flatseal  # flatpak permission manager
      - notify: false 
        scope: user

  # ── Fonts ─────────────────────────────────────────────────────
  - type: fonts
    fonts:
      nerd-fonts:
        - FiraCode
        - Hack
        - SourceCodePro
        - JetBrainsMono
        - NerdFontsSymbolsOnly
      google-fonts:
        - Roboto
        - NotoSansKorean

  # ── Systemd Services ─────────────────────────────────────────
  - type: systemd
    system:
      enabled:
        - tailscaled.service   # Tailscale VPN daemon (requires root)
    user:
      enabled:
        - emacs.service        # emacs daemon; connect via emacsclient

  # ── Custom Scripts ───────────────────────────────────────────
  - type: script
    scripts:
      - dirs.sh

  # ── Image Signing ─────────────────────────────────────────────
  - type: signing
